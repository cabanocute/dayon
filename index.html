<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cabano Home Page</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    min-height: 100vh;
   background: linear-gradient(135deg, #2193b0, #6dd5ed);
    display: flex;
    align-items: center;
    justify-content:center;
    color: whitesmoke;
    overflow-x:hidden;
    animation: fadeIn 0.8s ease-in;
  }

  .floating {
    position: fixed;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    border-radius: 50%;
    top: 20%;
    left: 10%;
    animation: float 6s ease-in-out infinite;
    z-index: -1;
  }

  .container {
    width: 90%;
    max-width: 900px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  
  .hero {
    text-align: center;
    margin-top: 30px;
  }

  .hero h1 {
    font-size: 42px;
    margin-bottom: 10px;
  }

  
  .menu-links {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .menu-links a {
    text-decoration: none;
    color: white;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  .menu-links a:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.25);
  }

  /* SOCIAL LINKS */
  .social-links {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .social-links a {
    text-decoration: none;
    color: white;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  .social-links a:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.25);
  }

 
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(40px); }
    100% { transform: translateY(0px); }
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .hero h1 {
      font-size: 28px;
    }

    .menu-links,
    .social-links {
      flex-direction: column;
      align-items: center;
    }
  }
</style>
</head>

<body>

<div class="floating"></div>

<div class="container">

  <section class="hero">
    <h1>Welcome to My Website</h1>
    <p id="typing"></p>

    <!-- MENU -->
    <div class="menu-links">
      <a href="vio.html">👤 About Me</a>
      <a href="date.html">🎮 My Games</a>
      <a href="gf.html">📸 Memories</a>
    </div>


</div>

<script>
const text = "This is my personal website built with HTML, CSS, and love 💜";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}

type();
</script>

</body>
</html>
